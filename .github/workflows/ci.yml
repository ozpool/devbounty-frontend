name: CI

on:
  pull_request:
  push:
    branches: [main]

# Read-only token: CI only builds and tests, it never writes to the repo.
permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Bind the PR base ref to an env var so the shell treats it as data, never
      # as code (a crafted branch name must not be able to inject a command).
      - name: commitlint
        env:
          BASE_REF: ${{ github.base_ref }}
        run: pnpm exec commitlint --from "origin/${BASE_REF}" --to HEAD
